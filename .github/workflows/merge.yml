name: ChatKuy CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Test & Build
    runs-on: self-hosted
    timeout-minutes: 60

    concurrency:
      group: flutter-ci
      cancel-in-progress: true

    env:
      FLUTTER_VERSION: "3.41.6"
      PREINSTALLED_FLUTTER_ROOT: /home/ncladr/actions-runner/_work/_tool/flutter/stable-3.41.6-x64/flutter
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.parallel=false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use preinstalled Flutter
        run: |
          if [ ! -x "$PREINSTALLED_FLUTTER_ROOT/bin/flutter" ]; then
            echo "::error::Flutter $FLUTTER_VERSION not found at $PREINSTALLED_FLUTTER_ROOT"
            ls -la "$(dirname "$PREINSTALLED_FLUTTER_ROOT")" || true
            exit 1
          fi

          echo "FLUTTER_ROOT=$PREINSTALLED_FLUTTER_ROOT" >> "$GITHUB_ENV"
          echo "$PREINSTALLED_FLUTTER_ROOT/bin" >> "$GITHUB_PATH"
          echo "$PREINSTALLED_FLUTTER_ROOT/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
          "$PREINSTALLED_FLUTTER_ROOT/bin/flutter" --version

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ env.FLUTTER_VERSION }}-
            ${{ runner.os }}-pub-

      - name: Cache build runner
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml') }}-
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate with Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run flutter test
        run: flutter test --no-pub

      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --no-pub \
            --obfuscate \
            --split-debug-info=build/flutter_mapping \
            --no-shrink \
            --no-tree-shake-icons \
            --build-number=$(( ${{ vars.ANDROID_BUILD_OFFSET }} + ${{ github.run_number }} ))

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Stop Gradle daemons after build
        if: always()
        run: |
          cd android
          ./gradlew --stop || true

  cd:
    name: Distribute APK
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Generate release notes
        run: |
          git log -6 --no-merges --pretty=format:"- %s by %an" > release_notes.txt

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: app-release.apk
          releaseNotesFile: release_notes.txt
