name: ChatKuy CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: Deploy Firebase Functions
        type: boolean
        default: true
      deploy_firestore_rules:
        description: Deploy Firestore Rules
        type: boolean
        default: true
      deploy_firestore_indexes:
        description: Deploy Firestore Indexes
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ci:
    name: Test & Build
    if: github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 60

    concurrency:
      group: flutter-ci
      cancel-in-progress: true

    env:
      FLUTTER_VERSION: "3.41.6"
      PREINSTALLED_FLUTTER_ROOT: /home/ncladr/actions-runner/_work/_tool/flutter/stable-3.41.6-x64/flutter
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.parallel=false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use preinstalled Flutter
        run: |
          if [ ! -x "$PREINSTALLED_FLUTTER_ROOT/bin/flutter" ]; then
            echo "::error::Flutter $FLUTTER_VERSION not found at $PREINSTALLED_FLUTTER_ROOT"
            ls -la "$(dirname "$PREINSTALLED_FLUTTER_ROOT")" || true
            exit 1
          fi

          echo "FLUTTER_ROOT=$PREINSTALLED_FLUTTER_ROOT" >> "$GITHUB_ENV"
          echo "$PREINSTALLED_FLUTTER_ROOT/bin" >> "$GITHUB_PATH"
          echo "$PREINSTALLED_FLUTTER_ROOT/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
          "$PREINSTALLED_FLUTTER_ROOT/bin/flutter" --version

      - name: Cache build runner
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml') }}-
            ${{ runner.os }}-build-runner-${{ env.FLUTTER_VERSION }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate with Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run flutter test
        run: flutter test --no-pub

      - name: Build APK
        run: |
          set -Eeuo pipefail

          log() {
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"
          }

          BUILD_NUMBER=$(( ${{ vars.ANDROID_BUILD_OFFSET }} + ${{ github.run_number }} ))

          log "Starting APK build"
          log "Flutter version: $FLUTTER_VERSION"
          log "GitHub run number: ${{ github.run_number }}"
          log "Android build offset: ${{ vars.ANDROID_BUILD_OFFSET }}"
          log "Resolved Android build number: $BUILD_NUMBER"

          echo "::group::Flutter doctor"
          flutter doctor -v || true
          echo "::endgroup::"

          echo "::group::Build APK"
          log "Running flutter build apk --release --verbose"
          flutter --verbose build apk \
            --release \
            --no-pub \
            --obfuscate \
            --split-debug-info=build/flutter_mapping \
            --no-shrink \
            --no-tree-shake-icons \
            --build-number="$BUILD_NUMBER"
          echo "::endgroup::"

          echo "::group::APK output"
          log "Build finished. Listing APK output files:"
          ls -lah build/app/outputs/flutter-apk/
          echo "::endgroup::"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Stop Gradle daemons after build
        if: always()
        run: |
          cd android
          ./gradlew --stop || true

  cd:
    name: Distribute APK
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Generate release notes
        run: |
          git log -6 --no-merges --pretty=format:"- %s by %an" > release_notes.txt

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: app-release.apk
          releaseNotesFile: release_notes.txt

  deploy-firebase:
    name: Deploy Firebase Functions & Firestore
    needs: ci
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.ci.result == 'success') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Firebase changes
        id: firebase_changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            targets=()

            if [ "${{ inputs.deploy_functions }}" = "true" ]; then
              targets+=("functions")
            fi

            if [ "${{ inputs.deploy_firestore_rules }}" = "true" ]; then
              targets+=("firestore:rules")
            fi

            if [ "${{ inputs.deploy_firestore_indexes }}" = "true" ]; then
              targets+=("firestore:indexes")
            fi

            if [ ${#targets[@]} -eq 0 ]; then
              echo "::error::Select at least one Firebase target to deploy."
              exit 1
            fi

            IFS=,
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "targets=${targets[*]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          if git diff --quiet "$base" "$head" -- functions firebase.json firestore.rules firestore.indexes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          targets=()

          if ! git diff --quiet "$base" "$head" -- functions firebase.json; then
            targets+=("functions")
          fi

          if ! git diff --quiet "$base" "$head" -- firestore.rules firebase.json; then
            targets+=("firestore:rules")
          fi

          if ! git diff --quiet "$base" "$head" -- firestore.indexes.json firebase.json; then
            targets+=("firestore:indexes")
          fi

          IFS=,
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "targets=${targets[*]}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.firebase_changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Functions dependencies
        if: contains(steps.firebase_changes.outputs.targets, 'functions')
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI
        if: steps.firebase_changes.outputs.changed == 'true'
        run: npm install -g firebase-tools

      - name: Deploy Firebase Functions
        if: contains(steps.firebase_changes.outputs.targets, 'functions')
        run: firebase deploy --only functions --project chatkuy-3f559
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore Rules
        if: contains(steps.firebase_changes.outputs.targets, 'firestore:rules')
        run: firebase deploy --only firestore:rules --project chatkuy-3f559
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore Indexes
        if: contains(steps.firebase_changes.outputs.targets, 'firestore:indexes')
        run: firebase deploy --only firestore:indexes --project chatkuy-3f559
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
